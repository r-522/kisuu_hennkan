<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基数変換クイズ</title>
  <style>
    :root {
      --bg:        #e8e5de;
      --paper:     #fafaf6;
      --border:    #ccc9bc;
      --text:      #1a1a1a;
      --muted:     #78756f;
      --ink:       #3a4f7a;
      --ink-light: #eaeff8;
      --correct:      #2e7d5a;
      --correct-bg:   #ebf6f1;
      --correct-bd:   #96cbb5;
      --wrong:        #a82828;
      --wrong-bg:     #faeaea;
      --wrong-bd:     #dda0a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Helvetica Neue', 'Hiragino Kaku Gothic Pro', Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ── */
    .site-header {
      background: #1e1e1e;
      color: #fff;
      padding: 0.6rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .site-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }

    .score-bar {
      display: flex;
      gap: 1.25rem;
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .score-item { display: flex; align-items: center; gap: 0.35rem; }
    .score-label { opacity: 0.6; white-space: nowrap; }
    .score-value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .score-streak .score-value { color: #fbbf24; }

    /* ── Layout ── */
    main {
      max-width: 540px;
      margin: 1.75rem auto;
      padding: 0 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    /* ── Question ── */
    .question-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.4rem 1.4rem 1.2rem;
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }

    .q-number {
      font-size: 0.68rem;
      font-weight: 700;
      color: #fff;
      background: var(--ink);
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }

    .q-label {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    #question-text {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.5;
      min-height: 2.3rem;
    }

    .base-sub {
      font-size: 0.58em;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0;
      position: relative;
      top: 0.08em;
    }

    /* ── Choices ── */
    #choices {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 1rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.97rem;
      cursor: pointer;
      text-align: left;
      width: 100%;
      min-height: 2.9rem;
      transition: border-color 0.1s, background 0.1s;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: var(--ink);
      background: var(--ink-light);
    }

    .choice-btn:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 1px;
    }

    .choice-label-badge {
      width: 1.7rem;
      height: 1.7rem;
      min-width: 1.7rem;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.1s;
    }

    .choice-btn:hover:not(:disabled) .choice-label-badge {
      border-color: var(--ink);
      color: var(--ink);
    }

    .choice-value {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .choice-btn.correct { border-color: var(--correct-bd); background: var(--correct-bg); }
    .choice-btn.correct .choice-label-badge {
      background: var(--correct); border-color: var(--correct); color: #fff;
    }

    .choice-btn.incorrect { border-color: var(--wrong-bd); background: var(--wrong-bg); }
    .choice-btn.incorrect .choice-label-badge {
      background: var(--wrong); border-color: var(--wrong); color: #fff;
    }

    .choice-btn:disabled { cursor: default; }

    /* ── Keyboard hint ── */
    .kbd-hint {
      font-size: 0.66rem;
      color: var(--muted);
      text-align: right;
      opacity: 0.7;
    }

    /* ── Result ── */
    #result {
      font-size: 1rem;
      font-weight: 700;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      border: 1px solid transparent;
      min-height: 2.65rem;
      display: flex;
      align-items: center;
    }

    #result:empty { display: none; }

    .result-correct  { background: var(--correct-bg); color: var(--correct); border-color: var(--correct-bd); }
    .result-incorrect { background: var(--wrong-bg);  color: var(--wrong);   border-color: var(--wrong-bd); }

    /* ── Explanation ── */
    #explanation {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.05rem 1.2rem;
      line-height: 1.7;
    }

    #explanation:empty { display: none; }

    .answer-summary {
      font-size: 0.9rem;
      padding: 0.38rem 0.7rem;
      border-left: 3px solid var(--ink);
      background: var(--ink-light);
      border-radius: 0 3px 3px 0;
      margin-bottom: 0.6rem;
    }

    #explanation h3 {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--ink);
      margin: 0.85rem 0 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding-bottom: 0.18rem;
      border-bottom: 1px solid var(--border);
    }

    #explanation h3:first-of-type { margin-top: 0.3rem; }

    #explanation p {
      font-size: 0.86rem;
      margin: 0.28rem 0;
      color: var(--muted);
    }

    #explanation p strong { color: var(--text); }

    .calc-steps {
      background: #eeebe3;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.5rem 0.8rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.81rem;
      margin: 0.25rem 0;
    }

    .calc-row {
      padding: 0.12rem 0;
      border-bottom: 1px solid #dbd7cd;
    }

    .calc-row:last-child { border-bottom: none; }

    .calc-row.total {
      font-weight: 700;
      color: var(--ink);
      margin-top: 0.15rem;
      padding-top: 0.25rem;
      border-top: 1.5px solid var(--border);
      border-bottom: none;
    }

    /* ── Actions ── */
    .action-buttons { display: flex; gap: 0.5rem; }

    .btn {
      padding: 0.65rem 1.2rem;
      border: 1px solid transparent;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 2.6rem;
      transition: opacity 0.1s;
    }

    .btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .btn:active { opacity: 0.82; }

    .btn-next { background: var(--ink); color: #fff; flex: 1; }
    .btn-next:hover { opacity: 0.88; }

    .btn-reset {
      background: var(--paper);
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-reset:hover { background: var(--bg); }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      #question-text { font-size: 1.2rem; }
      .score-bar { gap: 0.75rem; font-size: 0.7rem; }
      .score-item.hide-xs { display: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">基数変換クイズ</h1>
    <div class="score-bar" aria-label="スコア">
      <div class="score-item">
        <span class="score-label">正解</span>
        <span id="score-correct" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">回答</span>
        <span id="score-total" class="score-value">0</span>
      </div>
      <div class="score-item hide-xs">
        <span class="score-label">正答率</span>
        <span id="score-rate" class="score-value">—</span>
      </div>
      <div class="score-item score-streak">
        <span class="score-label">連続</span>
        <span id="score-streak" class="score-value">0</span>
      </div>
    </div>
  </header>

  <main>
    <div class="question-card">
      <div class="q-meta">
        <span id="q-number" class="q-number">Q1</span>
        <span class="q-label">問題</span>
      </div>
      <p id="question-text" aria-live="polite"></p>
    </div>

    <div id="choices" role="group" aria-label="選択肢"></div>

    <p class="kbd-hint">キー操作：1 2 3 4 で回答　Enter で次へ</p>

    <div id="result" role="status" aria-live="assertive"></div>

    <div id="explanation" aria-label="解説"></div>

    <div class="action-buttons">
      <button id="next-btn" class="btn btn-next" hidden>次の問題 →</button>
      <button id="reset-btn" class="btn btn-reset">リセット</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
